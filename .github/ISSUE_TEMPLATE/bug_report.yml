name: Bug report
description: Report a reproducible defect in qas-sdk
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.
  - type: input
    id: sdk-version
    attributes:
      label: qas-sdk version
      placeholder: e.g. 0.1.4
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: e.g. 3.11.9
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, container/VM, and relevant setup details.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide minimal, deterministic steps.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or traceback
      render: shell
